name: Admin CI/CD

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: eu-north-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        run: |
          docker build -t admin .

      - name: Tag Docker Image
        run: |
          docker tag admin:latest 744420879952.dkr.ecr.eu-north-1.amazonaws.com/admin:latest

      - name: Push Docker Image
        run: |
          docker push 744420879952.dkr.ecr.eu-north-1.amazonaws.com/admin:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/microservices

            aws ecr get-login-password --region eu-north-1 | \
            sudo docker login --username AWS --password-stdin 744420879952.dkr.ecr.eu-north-1.amazonaws.com

            sudo docker compose pull admin

            sudo docker compose up -d admin
